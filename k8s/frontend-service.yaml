# k8s/frontend-service.yaml
# Exposes the nginx frontend externally via a GCP Load Balancer.
# External IP: 104.198.204.183  →  DNS: app.kamalgke.com
apiVersion: v1
kind: Service
metadata:
  name: youtube-analyst-frontend
  namespace: youtube-analyst
spec:
  selector:
    app: youtube-analyst-frontend
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer    # LoadBalancer = gets an external GCP IP
                        # IMPORTANT: must stay LoadBalancer — if changed to
                        # ClusterIP the external IP is lost and DNS breaks
