# k8s/backend-service.yaml
# Exposes the FastAPI backend externally via a GCP Load Balancer.
# External IP: 35.253.253.4  →  DNS: api.kamalgke.com
apiVersion: v1
kind: Service
metadata:
  name: youtube-analyst-backend
  namespace: youtube-analyst
spec:
  selector:
    app: youtube-analyst-backend
  ports:
    - port: 80
      targetPort: 8080
  type: LoadBalancer    # LoadBalancer = gets an external GCP IP
                        # ClusterIP = internal only (no external access)
