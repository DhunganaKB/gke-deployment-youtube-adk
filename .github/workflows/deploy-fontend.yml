# .github/workflows/deploy-frontend.yml
name: Build and Deploy Frontend to GKE

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'k8s/frontend-deployment.yaml'
  workflow_dispatch:

env:
  PROJECT_ID: deve-487713
  REGION:     us-central1
  CLUSTER:    youtube-analyst-cluster
  NAMESPACE:  youtube-analyst
  IMAGE:      us-central1-docker.pkg.dev/deve-487713/youtube-analyst/frontend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GKE_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}
          install_components: gke-gcloud-auth-plugin

      - run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push frontend image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            ./frontend
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.CLUSTER }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }}

      - name: Update frontend image
        run: |
          kubectl set image deployment/youtube-analyst-frontend \
            frontend=${{ env.IMAGE }}:${{ github.sha }} \
            --namespace ${{ env.NAMESPACE }}

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/youtube-analyst-frontend \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s
