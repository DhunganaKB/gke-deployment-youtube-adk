name: Deploy to Production

# Manually triggered from the GitHub Actions UI.
# This is intentional — production deploys should be a deliberate human action,
# not automatic on every push. After triggering, a second human approval is
# required via the "production" GitHub Environment before any gcloud command runs.
on:
  workflow_dispatch:

env:
  PROJECT_ID:   ${{ secrets.PROD_GCP_PROJECT_ID }}
  REGION:       ${{ secrets.PROD_GCP_REGION }}
  SERVICE_NAME: youtube-analyst
  # Points at prod project's own Artifact Registry (created by Terraform)
  IMAGE: us-central1-docker.pkg.dev/${{ secrets.PROD_GCP_PROJECT_ID }}/youtube-analyst/app

jobs:
  deploy-prod:
    name: Build, Push, Deploy  ← requires approval
    runs-on: ubuntu-latest
    environment: production   # ← HUMAN APPROVAL GATE
    # GitHub pauses here and emails/notifies required reviewers.
    # The job continues only after someone clicks "Approve" in the GitHub UI.

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── 2. Authenticate to GCP (prod project) ─────────────────────────────
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.PROD_GCP_SA_KEY }}

      # ── 3. Set up gcloud CLI ───────────────────────────────────────────────
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.PROD_GCP_PROJECT_ID }}

      # ── 4. Configure Docker for prod Artifact Registry ─────────────────────
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      # ── 5. Build Docker image ──────────────────────────────────────────────
      - name: Build Docker image
        run: |
          docker build \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --tag ${{ env.IMAGE }}:latest \
            .

      # ── 6. Push to prod Artifact Registry ──────────────────────────────────
      - name: Push Docker image
        run: |
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      # ── 7. Deploy to prod Cloud Run ────────────────────────────────────────
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --platform managed \
            --service-account youtube-analyst-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 2 \
            --timeout 300 \
            --min-instances 0 \
            --max-instances 10 \
            --set-env-vars "GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}" \
            --set-env-vars "GOOGLE_CLOUD_LOCATION=global" \
            --set-env-vars "GOOGLE_GENAI_USE_VERTEXAI=1" \
            --set-secrets "YOUTUBE_API_KEY=YOUTUBE_API_KEY:latest"
            # ↑ Reads from GCP Secret Manager instead of GitHub Secrets
            #   (the SA has roles/secretmanager.secretAccessor via Terraform)

      # ── 8. Print the live prod URL ─────────────────────────────────────────
      - name: Print service URL
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format "value(status.url)")
          echo "Production service deployed at: $URL"
          echo "service_url=$URL" >> $GITHUB_OUTPUT
