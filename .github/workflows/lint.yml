name: Lint (ruff)

# Runs independently on every push/PR that touches source code.
# Delegates entirely to the shared reusable workflow in math-package-tutorial
# which runs: ruff, pytest, pip-audit, bandit, and semgrep.
on:
  push:
    branches: [main]
    paths:
      - 'youtube_analyst/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'youtube_analyst/**'
      - 'tests/**'
      - 'requirements.txt'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  lint-test-security:
    uses: DhunganaKB/math-package-tutorial/.github/workflows/lint_test.yaml@main
    permissions:
      contents: read        # read source code
      pull-requests: write  # post ruff findings as PR comment
    with:
      source_path:       "youtube_analyst"
      requirements_path: "requirements.txt"
      tests_path:        "tests/unit"
      semgrep_rules:     "p/python p/owasp-top-ten"
